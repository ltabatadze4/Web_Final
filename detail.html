<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>წიგნის დეტალები — Tabata's Library</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="detail">

  <header class="site-header">
    <nav class="nav" aria-label="მთავარი ნავიგაცია">
      <a class="nav__brand" href="index.html">
        <img src="assets/logo.svg" alt="Tabata's Library ლოგო" width="28" height="28" />
        Tabata's Library
      </a>
      <button class="nav__burger" id="nav-burger" type="button" aria-label="მენიუ" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav__links" id="nav-guest" role="list">
        <li><a class="nav__link" href="index.html" data-i18n="nav.search">ძიება</a></li>
        <li><a class="nav__link" href="adaptations.html" data-i18n="nav.adaptations">ეკრანიზაციები</a></li>
        <li><a class="nav__link" href="roulette.html" data-i18n="nav.roulette">ბედის ბორბალი</a></li>
        <li><a class="nav__link" href="saved.html" data-i18n="nav.saved">ჩემი ბიბლიოთეკა</a></li>
        <li id="nav-login-item"><a class="nav__link" href="login.html" data-i18n="nav.login">შესვლა</a></li>
      </ul>
      <div class="nav__user" id="nav-user" hidden>
        <ul class="nav__user-links" role="list">
          <li><span class="nav__user-name" id="nav-user-name"></span></li>
          <li><button class="nav__logout" id="nav-logout" type="button" data-i18n="nav.logout">გასვლა</button></li>
        </ul>
      </div>
      <button class="nav__lang" id="lang-toggle" type="button" aria-label="Switch language">EN</button>
    </nav>
  </header>

  <main class="container">
    <article class="detail" aria-label="წიგნის ინფორმაცია">

      <div>
        <img
          class="detail__cover"
          id="detail-cover"
          src="assets/cover-placeholder.svg"
          alt="წიგნის ყდა"
          width="220"
        />
      </div>

      <div>
        <h1 class="detail__title" id="detail-title" data-i18n="detail.title.loading">იტვირთება…</h1>
        <p class="detail__author" id="detail-author"></p>

        <div class="shelf-box" aria-label="თაროზე შენახვა">
          <label class="form__label" for="status-select" data-i18n="detail.status.label">სტატუსი:</label>
          <select class="select" id="status-select">
            <option value="want" data-i18n="detail.status.want">გადასაკითხი მაქვს</option>
            <option value="reading" data-i18n="detail.status.reading">ვკითხულობ</option>
            <option value="read" data-i18n="detail.status.read">უკვე წავიკითხე</option>
          </select>
          <button class="btn" id="add-btn" type="button" data-i18n="detail.add.btn">თაროზე დამატება</button>
          <span class="feedback" id="shelf-feedback" aria-live="polite"></span>
        </div>

        <div id="free-read" aria-live="polite"></div>

        <p class="detail__desc" id="detail-desc"></p>
        <ul class="subjects" id="detail-subjects" aria-label="თემები"></ul>

        <a class="back-link" href="index.html" data-i18n="detail.back">← ძიებაზე დაბრუნება</a>
      </div>

    </article>
  </main>

  <footer class="site-footer" data-i18n="footer.text">
    იმედია საიტი მოგწონთ (მე კეთებისას ძალიან გავერთე) · Tabata's Library · 2026
  </footer>


  <div class="me-corner" data-i18n-title="me.corner" title="გამარჯობა! 👋"><img src="assets/me.png" alt="Tabata" /></div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
